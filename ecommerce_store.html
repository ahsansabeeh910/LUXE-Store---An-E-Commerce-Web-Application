<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LUXE Store</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <div class="logo">LUXE</div>

  <ul class="nav-links">
    <li><a class="active">Shop</a></li>
    <li><a>Collections</a></li>
    <li><a>New Arrivals</a></li>
    <li><a>Sale</a></li>
  </ul>

  <div class="nav-right">
    <button class="icon-btn">
      <i class="ti ti-search"></i>
    </button>

    <button class="icon-btn" onclick="openCart()">
      <i class="ti ti-shopping-bag"></i>
      <span class="badge" id="cart-count">0</span>
    </button>

    <button class="icon-btn">
      <i class="ti ti-user"></i>
    </button>
  </div>
</nav>

<section class="hero">
  <div class="hero-label">New Season Arrivals</div>

  <h1>
    Curated for <br>
    <span>Discerning Taste</span>
  </h1>

  <p>
    Discover premium luxury products with modern shopping experience.
  </p>

  <button class="cta">
    Explore Collection
  </button>
</section>

<section class="main-container">

  <aside class="sidebar">

    <h3>Categories</h3>

    <button onclick="filterProducts('All')">All</button>
    <button onclick="filterProducts('Accessories')">Accessories</button>
    <button onclick="filterProducts('Apparel')">Apparel</button>
    <button onclick="filterProducts('Footwear')">Footwear</button>

  </aside>

  <main>

    <div class="top-bar">

      <input
        type="text"
        id="search"
        placeholder="Search products..."
        onkeyup="searchProducts()"
      >

      <select onchange="sortProducts(this.value)">
        <option value="default">Sort</option>
        <option value="low">Price Low-High</option>
        <option value="high">Price High-Low</option>
      </select>

    </div>

    <div class="product-grid" id="product-grid"></div>

  </main>

</section>

<div class="cart-panel" id="cart-panel">

  <div class="cart-header">
    <h2>Your Cart</h2>

    <button onclick="closeCart()">
      <i class="ti ti-x"></i>
    </button>
  </div>

  <div id="cart-items"></div>

  <div class="cart-footer">
    <h3 id="cart-total">Total: ₹0</h3>

    <button class="checkout-btn">
      Checkout
    </button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
